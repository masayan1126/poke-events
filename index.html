const TAG_CONFIG = {
  csp: { label: "CSP対象", cls: "tag-csp" }, large: { label: "大型大会", cls: "tag-large" },
  near: { label: "駅近", cls: "tag-near" }, long: { label: "長時間開催", cls: "tag-long" },
  night: { label: "夜遅くまで", cls: "tag-night" }, full: { label: "満席", cls: "tag-full" },
  beginner: { label: "初心者歓迎", cls: "tag-beginner" }
};

let selectedDateIndex = -1;
let selectedAreaId = null;
let selectedFilter = 'all';

function init() {
  document.getElementById('headerMeta').textContent = DATA.meta.reportDate + ' 時点';
  document.title = 'ポケカ イベントプラン ' + DATA.meta.region;
  renderDateChips();
  renderAreaChips();
  renderFooter();
}

function getSelected() {
  if (selectedDateIndex < 0 || !selectedAreaId) return null;
  const d = DATA.dates[selectedDateIndex];
  return d.areaData[selectedAreaId] || null;
}

function renderDateChips() {
  const el = document.getElementById('dateChips');
  el.innerHTML = DATA.dates.map((d, i) => {
    const dt = new Date(d.date.replace(/\//g, '-'));
    const totalFiltered = Object.values(d.areaData).reduce((s, a) => s + a.filteredCount, 0);
    return `<button class="chip ${i === selectedDateIndex ? 'active' : ''}" data-idx="${i}">
      ${dt.getMonth()+1}/${dt.getDate()}（${d.day}）<span class="chip-sub">${totalFiltered}件</span>
    </button>`;
  }).join('');
  el.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedDateIndex = parseInt(btn.dataset.idx);
      selectedFilter = 'all';
      renderDateChips();
      renderAreaChips();
      updateView();
    });
  });
}

function renderAreaChips() {
  const el = document.getElementById('areaChips');
  const dateEntry = selectedDateIndex >= 0 ? DATA.dates[selectedDateIndex] : null;
  el.innerHTML = DATA.areas.map(a => {
    const hasData = dateEntry && dateEntry.areaData[a.id];
    const count = hasData ? dateEntry.areaData[a.id].filteredCount : 0;
    const active = selectedAreaId === a.id ? 'active' : '';
    const disabled = !hasData ? 'disabled' : '';
    return `<button class="chip ${active} ${disabled}" data-area="${a.id}" ${hasData ? '' : 'disabled'}>
      ${a.name} <span class="chip-sub">${count}件</span>
    </button>`;
  }).join('');
  el.querySelectorAll('.chip:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedAreaId = btn.dataset.area;
      selectedFilter = 'all';
      renderAreaChips();
      updateView();
    });
  });
}

function updateView() {
  const sel = document.getElementById('currentSelection');
  const plansEl = document.getElementById('plansSection');
  const filterEl = document.getElementById('filterBarWrap');
  const contentEl = document.getElementById('contentWrap');
  const data = getSelected();

  if (!data) {
    sel.className = 'current-selection';
    plansEl.className = 'plans-section';
    filterEl.className = 'filter-bar';
    contentEl.className = 'content';
    return;
  }

  const d = DATA.dates[selectedDateIndex];
  const dt = new Date(d.date.replace(/\//g, '-'));
  const areaName = DATA.areas.find(a => a.id === selectedAreaId).name;
  sel.className = 'current-selection visible';
  sel.innerHTML = `&#128204; <strong>${dt.getMonth()+1}/${dt.getDate()}（${d.day}）${areaName}</strong> のイベント ${data.filteredCount}件（全${data.totalEvents}件中）`;

  plansEl.className = 'plans-section visible';
  filterEl.className = 'filter-bar visible';
  contentEl.className = 'content visible';

  document.getElementById('plansSub').textContent = areaName + 'のおすすめプラン';
  renderPlans(data);
  renderFilters(data);
  renderEvents(data);
  renderNotes(data);

  plansEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderPlans(data) {
  const container = document.getElementById('plansContainer');
  if (!data.plans.length) { container.innerHTML = '<div class="plans-empty">プランはまだありません</div>'; return; }
  container.innerHTML = data.plans.map((plan, idx) => {
    const stars = '\u2605'.repeat(plan.rating) + '\u2606'.repeat(5 - plan.rating);
    const steps = plan.steps.map(s => s.url
      ? `<a class="plan-step-link" href="${s.url}" target="_blank" rel="noopener"><div class="plan-step-time">${s.time}</div><div class="plan-step-detail"><div class="plan-step-event">${s.event}</div><div class="plan-step-venue">${s.venue}</div><div class="plan-step-meta"><span class="plan-step-area">${s.area}</span><span class="plan-step-arrow">詳細 &#8250;</span></div></div></a>`
      : `<div class="plan-step"><div class="plan-step-time">${s.time}</div><div class="plan-step-detail"><div class="plan-step-event">${s.event}</div><div class="plan-step-venue">${s.venue}</div><div class="plan-step-meta"><span class="plan-step-area">${s.area}</span></div></div></div>`
    ).join('');
    return `<div class="plan-card open" id="plan-${plan.id}" style="animation-delay:${idx*0.05}s">
      <div class="plan-header" onclick="togglePlan('${plan.id}')">
        <span class="plan-badge">${plan.id}</span>
        <div class="plan-info"><div class="plan-name">${plan.name}</div><div class="plan-sub">${plan.subtitle}</div></div>
        <span class="plan-rating">${stars}</span><span class="plan-chevron">&#9662;</span>
      </div>
      <div class="plan-body"><div class="plan-body-inner">${steps}<div class="plan-merit"><strong>メリット：</strong>${plan.merit}</div></div></div>
    </div>`;
  }).join('');
}
function togglePlan(id) { document.getElementById('plan-' + id).classList.toggle('open'); }

function renderFilters(data) {
  const bar = document.getElementById('filterBar');
  const total = data.categories.reduce((s, c) => s + c.events.length, 0);
  let html = `<button class="filter-pill ${selectedFilter==='all'?'active':''}" data-filter="all" style="--active-color:var(--primary)">すべて <span class="cnt">${total}</span></button>`;
  data.categories.forEach(cat => {
    html += `<button class="filter-pill ${selectedFilter===cat.id?'active':''}" data-filter="${cat.id}" style="--active-color:${cat.color}"><span class="dot" style="background:${cat.color}"></span>${cat.name.split('：').pop().split(' / ')[0]}<span class="cnt">${cat.events.length}</span></button>`;
  });
  bar.innerHTML = html;
  bar.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedFilter = btn.dataset.filter;
      bar.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderEvents(getSelected());
    });
  });
}

function renderEvents(data) {
  const container = document.getElementById('eventsContainer');
  let html = '';
  data.categories.forEach(cat => {
    if (selectedFilter !== 'all' && selectedFilter !== cat.id) return;
    const icon = cat.id==='gym_battle'?'&#9876;':cat.id==='open_league'?'&#127942;':cat.id==='friend_battle'?'&#129309;':'&#127919;';
    html += `<div class="section-divider"><div class="section-icon" style="background:${cat.color}">${icon}</div><div><span class="section-label">${cat.name}</span><span class="section-count">（${cat.events.length}件）</span></div></div><div class="events-grid">`;
    cat.events.forEach((ev, i) => {
      const tags = ev.tags.map(t => { const c = TAG_CONFIG[t]; return c ? `<span class="tag ${c.cls}">${c.label}</span>` : ''; }).join('');
      html += `<div class="event-card" style="animation-delay:${i*0.05}s"><div class="category-accent" style="background:${cat.color}"></div><a href="${ev.url||DATA.meta.searchUrl}" target="_blank" rel="noopener"><div class="event-top"><span class="event-time" style="color:${cat.color}">${ev.time}</span><div class="event-tags">${tags}</div></div><div class="event-name">${ev.name}</div><div class="event-venue">${ev.venue}</div><div class="event-address">${ev.address}</div><div class="event-bottom"><span class="meta-item">${ev.fee}</span><span class="meta-item">${ev.capacity}</span><span class="meta-item">${ev.distance}</span><span class="event-link-arrow">詳細 &#8250;</span></div></a></div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html || '<div class="empty"><div class="empty-icon">&#128269;</div><p>イベントデータがありません</p></div>';
}

function renderNotes(data) {
  const container = document.getElementById('notesContainer');
  if (!data.notes.length) { container.innerHTML = ''; return; }
  container.innerHTML = `<div class="notes-card"><div class="notes-title">注意事項</div><ul class="notes-list">${data.notes.map(n=>`<li>${n}</li>`).join('')}</ul></div>`;
}

function renderFooter() {
  document.getElementById('footer').innerHTML = `<p>データ元: <a href="${DATA.meta.searchUrl}" target="_blank" rel="noopener">ポケモンカードゲーム プレイヤーズクラブ</a></p><p style="margin-top:4px">検索日 ${DATA.meta.reportDate} 自動実行</p><a href="${DATA.meta.searchUrl}" target="_blank" rel="noopener" class="footer-source">Players Clubで最新情報を確認</a>`;
}

document.addEventListener('DOMContentLoaded', init);
</script>
